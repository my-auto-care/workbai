name: workbay
description: Workbay AI - Hands-free automotive inspection
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP
  http: ^1.2.1
  # LiveKit voice
  livekit_client: ^2.1.3
  # Auth0
  auth0_flutter: ^1.4.0
  # State management
  provider: ^6.1.2
  # Local storage
  shared_preferences: ^2.2.3
  # Camera / photo
  image_picker: ^1.1.2
  # UUID
  uuid: ^4.4.0
  # Icons
  cupertino_icons: ^1.0.8

dependency_overrides:
  # flutter_webrtc 0.13.1+hotfix.1 fails to compile against compileSdk 35
  # Override to latest patched version
  flutter_webrtc: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
