name: workbay
description: Workbay AI - Hands-free automotive inspection
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  livekit_client: ^2.1.3
  auth0_flutter: ^1.4.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8

dependency_overrides:
  # 0.13.1 fixes onSurfaceDestroyed Android compile error (SDK 35)
  # without bumping path dependency beyond what Flutter 3.27.4 ships
  flutter_webrtc: 0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
