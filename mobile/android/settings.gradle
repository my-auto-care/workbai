pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

def flutterPluginsFile = new File(rootProject.projectDir.parentFile, '.flutter-plugins')
if (flutterPluginsFile.exists()) {
    flutterPluginsFile.eachLine { line ->
        if (line && !line.startsWith('#')) {
            def eqIdx = line.indexOf('=')
            if (eqIdx > 0) {
                def pluginName = line.substring(0, eqIdx).trim()
                def pluginPath = line.substring(eqIdx + 1).trim()
                def androidDir = new File(pluginPath, 'android')
                if (androidDir.exists()) {
                    include ":${pluginName}"
                    project(":${pluginName}").projectDir = androidDir

                    // Patch flutter_webrtc SurfaceTextureRenderer to fix
                    // onSurfaceDestroyed -> onSurfaceCleanup for compileSdk 35
                    if (pluginName == 'flutter_webrtc') {
                        def rendererFile = new File(pluginPath,
                            'android/src/main/java/com/cloudwebrtc/webrtc/SurfaceTextureRenderer.java')
                        if (rendererFile.exists()) {
                            def content = rendererFile.text
                            if (content.contains('onSurfaceDestroyed')) {
                                content = content.replace(
                                    'public void onSurfaceDestroyed() {',
                                    'public void onSurfaceCleanup() {'
                                )
                                // Also add onSurfaceDestroyed as no-op if needed by older SDKs
                                rendererFile.text = content
                                println "Patched flutter_webrtc SurfaceTextureRenderer: onSurfaceDestroyed -> onSurfaceCleanup"
                            }
                        }
                    }
                }
            }
        }
    }
}

include ":app"
