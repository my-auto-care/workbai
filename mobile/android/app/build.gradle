plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}
def flutterRoot = localProperties.getProperty('flutter.sdk')

android {
    namespace "ai.workbay.app"
    compileSdk 35
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId "ai.workbay.app"
        minSdk 24
        targetSdk 35
        versionCode flutter.versionCode
        versionName flutter.versionName
        manifestPlaceholders += [
            auth0Domain: "dev-bs1544neeany10qn.us.auth0.com",
            auth0Scheme: "workbay",
            applicationName: "io.flutter.app.FlutterApplication"
        ]
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}

flutter { source '../..' }

dependencies {
    // Explicitly add flutter engine AARs so Java/Kotlin sources can resolve
    // io.flutter.* and androidx.annotation.* that the plugin should provide.
    implementation fileTree(
        dir: "${flutterRoot}/bin/cache/artifacts/engine/android-arm64-release",
        include: ['*.jar', '*.aar']
    )
    implementation fileTree(
        dir: "${flutterRoot}/bin/cache/artifacts/engine/android-x64-release",
        include: ['*.jar', '*.aar']
    )
    implementation 'androidx.annotation:annotation:1.7.0'
}
