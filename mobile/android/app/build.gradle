plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}
def flutterRoot = localProperties.getProperty('flutter.sdk')

android {
    namespace "ai.workbay.app"
    compileSdk 35
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = '17' }

    defaultConfig {
        applicationId "ai.workbay.app"
        minSdk 24
        targetSdk 35
        versionCode flutter.versionCode
        versionName flutter.versionName
        manifestPlaceholders += [
            auth0Domain: "dev-bs1544neeany10qn.us.auth0.com",
            auth0Scheme: "workbay",
            applicationName: "io.flutter.app.FlutterApplication"
        ]
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}

flutter { source '../..' }

// Explicitly add flutter embedding to Kotlin compile classpath.
// The plugin should do this but fails with AGP 8 + new plugins DSL.
afterEvaluate {
    def embeddingJar = file("${flutterRoot}/bin/cache/artifacts/engine/android-x64/flutter_embedding_debug.jar")
    if (!embeddingJar.exists()) {
        embeddingJar = file("${flutterRoot}/bin/cache/artifacts/engine/android-arm64/flutter_embedding_debug.jar")
    }
    if (embeddingJar.exists()) {
        tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            libraries.from(embeddingJar)
        }
    }
}
