plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localPropsFile = rootProject.file("local.properties")
def localProps = new Properties()
if (localPropsFile.exists()) { localPropsFile.withReader('UTF-8') { r -> localProps.load(r) } }
def flutterRoot = localProps.getProperty('flutter.sdk')

android {
    namespace "ai.workbay.app"
    compileSdk 35
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = '17' }

    defaultConfig {
        applicationId "ai.workbay.app"
        minSdk 24
        targetSdk 35
        versionCode flutter.versionCode
        versionName flutter.versionName
        manifestPlaceholders += [
            auth0Domain: "dev-bs1544neeany10qn.us.auth0.com",
            auth0Scheme: "workbay",
            applicationName: "io.flutter.app.FlutterApplication"
        ]
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}

flutter { source '../..' }

dependencies {
    compileOnly files(
        "${flutterRoot}/bin/cache/artifacts/engine/android-arm64-release/flutter_embedding_release.jar",
        "${flutterRoot}/bin/cache/artifacts/engine/android-x64-release/flutter_embedding_release.jar",
        "${flutterRoot}/bin/cache/artifacts/engine/android-arm-release/flutter_embedding_release.jar"
    )
}
