plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "ai.workbay.app"
    compileSdk 34
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId "ai.workbay.app"
        minSdk 24
        targetSdk 34
        versionCode flutter.versionCode
        versionName flutter.versionName
        manifestPlaceholders += [
            auth0Domain: "dev-bs1544neeany10qn.us.auth0.com",
            auth0Scheme: "workbay",
            applicationName: "io.flutter.app.FlutterApplication"
        ]
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}

flutter { source '../..' }

// Add all flutter plugin projects as dependencies
def flutterPluginsFile = new File(rootProject.projectDir.parentFile, '.flutter-plugins')
if (flutterPluginsFile.exists()) {
    dependencies {
        flutterPluginsFile.eachLine { line ->
            if (line && !line.startsWith('#')) {
                def parts = line.split('=')
                if (parts.length == 2) {
                    def pluginName = parts[0].trim()
                    def androidDir = new File(parts[1].trim(), 'android')
                    if (androidDir.exists()) {
                        implementation project(":${pluginName}")
                    }
                }
            }
        }
    }
}
