plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "ai.workbay.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions { jvmTarget = '1.8' }

    defaultConfig {
        applicationId "ai.workbay.app"
        minSdk 24
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        manifestPlaceholders += [
            auth0Domain: "dev-bs1544neeany10qn.us.auth0.com",
            auth0Scheme: "workbay",
            applicationName: "io.flutter.app.FlutterApplication"
        ]
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}

dependencies {
    compileOnly "io.flutter:flutter_embedding_debug:1.0.0-42d3d75a56b6f6b6b6b6b6b6b6b6b6b6b6b6b6b"
}

flutter { source '../..' }
