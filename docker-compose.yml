services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  voice-agent:
    build: ./backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    environment:
      - LIVEKIT_URL=wss://workbay-ai-rrcovb9m.livekit.cloud
      - LIVEKIT_API_KEY=APIqwhVtD3beAgw
      - LIVEKIT_API_SECRET=NfX8UL4Y1AAAieBjaWdW0AQs1JMXZ6dSsQTDhBZIxET
    command: >
      python -m app.voice.agent start
      --url wss://workbay-ai-rrcovb9m.livekit.cloud
      --api-key APIqwhVtD3beAgw
      --api-secret NfX8UL4Y1AAAieBjaWdW0AQs1JMXZ6dSsQTDhBZIxET

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
