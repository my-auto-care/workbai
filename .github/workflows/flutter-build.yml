name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Patch flutter_webrtc
        working-directory: mobile
        run: |
          sed -i 's/onSurfaceCleanup()/onSurfaceDestroyed()/g' \
            flutter_webrtc_local/android/src/main/java/com/cloudwebrtc/webrtc/SurfaceTextureRenderer.java

      - name: Build APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: workbay-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
